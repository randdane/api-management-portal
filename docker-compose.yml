services:
  portal:
    build: .
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - REQUIRE_HTTPS=false
      - DATABASE_URL=postgresql+asyncpg://portal:portal@db:5432/portal
      - REDIS_URL=redis://redis:6379/1
      - SECRET_KEY=dev-secret-change-me-in-production
      - GATEWAY_ADMIN_URL=http://host.docker.internal:8000
      - GATEWAY_SERVICE_JWT=${GATEWAY_SERVICE_JWT:-}
      - GATEWAY_PORTAL_SHARED_SECRET=dev-shared-secret-change-me-in-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
      - ./alembic:/app/alembic:ro
    # Run migrations then start the server
    command: >
      sh -c "uv run alembic upgrade head && uv run uvicorn portal.main:app --host 0.0.0.0 --port 8001 --reload"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: portal
    volumes:
      - portal_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - portal_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  portal_db:
  portal_redis:

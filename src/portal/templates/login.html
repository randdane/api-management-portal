<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — API Portal</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@starfederation/datastar@1.0.0-RC.8/dist/datastar.js"></script>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-title">API Management Portal</div>
      <div class="login-subtitle">Sign in to manage your gateway tokens</div>

      <div id="login-error"></div>

      <div
        data-signals='{"username": "", "password": "", "redirect": ""}'
        data-effect="$redirect && (window.location.href = $redirect)"
      ></div>
      <form
        data-signals='{"username": "", "password": ""}'
        data-on-submit__prevent="@post('/api/auth/login')"
        data-indicator="loginIndicator"
      >
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input
            id="username"
            type="text"
            class="form-input"
            data-bind-username
            autocomplete="username"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            id="password"
            type="password"
            class="form-input"
            data-bind-password
            autocomplete="current-password"
            required
          >
        </div>

        <button
          type="submit"
          class="btn btn-primary w-full mt-4"
          data-indicator="loginIndicator"
        >
          Sign in
        </button>
      </form>

      {% if oauth2_enabled %}
      <div style="margin-top:20px;text-align:center;border-top:1px solid var(--border);padding-top:20px">
        <a href="/api/auth/oauth2/authorize" class="btn btn-outline w-full">
          Sign in with SSO
        </a>
      </div>
      {% endif %}
    </div>
  </div>
</body>
</html>
